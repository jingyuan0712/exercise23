<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exercise Button</title>

<style>
body{
    font-family: Roboto, Arial;
    padding: 50px;
}

/* 按鈕 */
.btn{
    height: 22px;                 /* ⭐ 高度 */
    line-height: 22px;            /* 文字置中 */
    padding: 0 10px;              /* 左右間距 */

    background-color: #ffffff;    /* 背景 */
    color: #212121;               /* 字色 */
    font-size: 13px;

    border: 1px solid #2f2f2f;    /* 外框 */
    border-radius: 8px;           /* ⭐ 圓角 */

    display: inline-block;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="btn">查詢資料</div>

</body>
</html>
